name: Content CI

on:
  push:
    paths:
      - "src/content/blog/**"
      - "public/image/blog/**"
      - ".github/workflows/content-ci.yml"
  pull_request:
    paths:
      - "src/content/blog/**"
      - "public/image/blog/**"
      - ".github/workflows/content-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  content:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate and build content
        run: npm run content:check
