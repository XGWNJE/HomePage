name: Frontend CI

on:
  push:
    paths:
      - "src/**"
      - "!src/content/blog/**"
      - "public/**"
      - "!public/image/blog/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "astro.config.mjs"
      - "tailwind.config.mjs"
      - "tsconfig.json"
      - ".agents/skills/deploy-homepage/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "!src/content/blog/**"
      - "public/**"
      - "!public/image/blog/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "astro.config.mjs"
      - "tailwind.config.mjs"
      - "tsconfig.json"
      - ".agents/skills/deploy-homepage/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Test frontend contracts
        run: npm test

      - name: Type-check frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build
