<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">XGWNJE personal index</title>
  <desc id="desc">Research, engineering, notes, code and images flow into an Astro index and publish to the web, RSS and API.</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090a0c"/>
      <stop offset="0.58" stop-color="#0d0d10"/>
      <stop offset="1" stop-color="#151014"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.76" cy="0.48" r="0.62">
      <stop offset="0" stop-color="#c5a769" stop-opacity="0.13"/>
      <stop offset="0.55" stop-color="#8d6673" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#090a0c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#f4ead6" stroke-opacity="0.045"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#surface)"/>
  <rect x="1" y="1" width="1198" height="418" rx="27" fill="none" stroke="#d8c79e" stroke-opacity="0.22"/>
  <rect x="20" y="20" width="1160" height="380" rx="20" fill="url(#grid)"/>
  <rect width="1200" height="420" rx="28" fill="url(#glow)"/>

  <g fill="none" stroke="#c5a769" stroke-opacity="0.24">
    <path d="M48 92V48H92"/>
    <path d="M1108 48h44v44"/>
    <path d="M48 328v44h44"/>
    <path d="M1108 372h44v-44"/>
    <path d="M600 62v296" stroke-opacity="0.13"/>
  </g>

  <circle cx="1010" cy="112" r="72" fill="#bd5575" fill-opacity="0.075" filter="url(#soft)"/>
  <circle cx="720" cy="306" r="88" fill="#c5a769" fill-opacity="0.07" filter="url(#soft)"/>

  <g font-family="ui-monospace, SFMono-Regular, Consolas, Liberation Mono, monospace">
    <text x="72" y="78" fill="#c5a769" font-size="13" letter-spacing="3">XGWNJE / PERSONAL INDEX</text>
    <circle cx="500" cy="73" r="4" fill="#bd5575"/>
    <text x="514" y="78" fill="#8f8b85" font-size="12" letter-spacing="1.3">ONLINE · 2026</text>
  </g>

  <text x="72" y="171" fill="#f4ead6" font-size="64" letter-spacing="1" font-family="Georgia, Times New Roman, serif">XGWNJE</text>
  <text x="72" y="215" fill="#c5a769" font-size="36" font-style="italic" font-family="Georgia, Times New Roman, serif">Index</text>
  <text x="72" y="266" fill="#d8d0c1" font-size="20" font-family="system-ui, -apple-system, Segoe UI, sans-serif">把研究、工程与长期笔记，整理成一套个人索引。</text>
  <text x="72" y="302" fill="#898681" font-size="13" letter-spacing="2.1" font-family="ui-monospace, SFMono-Regular, Consolas, monospace">RESEARCH · ENGINEERING · LONG-TERM NOTES</text>

  <g transform="translate(72 336)" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="11" letter-spacing="1">
    <g>
      <rect width="142" height="34" rx="17" fill="#f4ead6" fill-opacity="0.055" stroke="#f4ead6" stroke-opacity="0.14"/>
      <circle cx="18" cy="17" r="3" fill="#c5a769"/>
      <text x="30" y="21" fill="#c9c1b4">STATIC FRONTEND</text>
    </g>
    <g transform="translate(154)">
      <rect width="150" height="34" rx="17" fill="#f4ead6" fill-opacity="0.055" stroke="#f4ead6" stroke-opacity="0.14"/>
      <circle cx="18" cy="17" r="3" fill="#bd5575"/>
      <text x="30" y="21" fill="#c9c1b4">SELF-HOSTED API</text>
    </g>
    <g transform="translate(316)">
      <rect width="164" height="34" rx="17" fill="#f4ead6" fill-opacity="0.055" stroke="#f4ead6" stroke-opacity="0.14"/>
      <circle cx="18" cy="17" r="3" fill="#8d9b83"/>
      <text x="30" y="21" fill="#c9c1b4">BILINGUAL CONTENT</text>
    </g>
  </g>

  <g transform="translate(626 72)">
    <text x="0" y="0" fill="#8f8b85" font-size="12" letter-spacing="2.2" font-family="ui-monospace, SFMono-Regular, Consolas, monospace">HOW THE INDEX WORKS</text>

    <g transform="translate(0 34)" font-family="ui-monospace, SFMono-Regular, Consolas, monospace">
      <g font-size="12">
        <rect width="150" height="170" rx="16" fill="#f4ead6" fill-opacity="0.035" stroke="#f4ead6" stroke-opacity="0.13"/>
        <text x="20" y="30" fill="#8f8b85" font-size="10" letter-spacing="1.8">INPUT / 01</text>
        <circle cx="24" cy="65" r="4" fill="#c5a769"/>
        <text x="40" y="69" fill="#ded5c5">NOTE</text>
        <circle cx="24" cy="103" r="4" fill="#bd5575"/>
        <text x="40" y="107" fill="#ded5c5">CODE</text>
        <circle cx="24" cy="141" r="4" fill="#8d9b83"/>
        <text x="40" y="145" fill="#ded5c5">IMAGE</text>
      </g>

      <g transform="translate(194 34)">
        <rect width="174" height="102" rx="18" fill="#c5a769" fill-opacity="0.09" stroke="#c5a769" stroke-opacity="0.48"/>
        <text x="87" y="30" text-anchor="middle" fill="#9d927d" font-size="10" letter-spacing="1.8">ORGANIZE / 02</text>
        <text x="87" y="64" text-anchor="middle" fill="#f4ead6" font-size="16" letter-spacing="0.8">ASTRO INDEX</text>
        <rect x="54" y="78" width="66" height="3" rx="1.5" fill="#bd5575"/>
      </g>

      <g transform="translate(412)">
        <rect width="150" height="170" rx="16" fill="#f4ead6" fill-opacity="0.035" stroke="#f4ead6" stroke-opacity="0.13"/>
        <text x="20" y="30" fill="#8f8b85" font-size="10" letter-spacing="1.8">PUBLISH / 03</text>
        <text x="20" y="69" fill="#ded5c5" font-size="12">WEB</text>
        <path d="M75 65h48" stroke="#c5a769" stroke-opacity="0.55"/>
        <text x="20" y="107" fill="#ded5c5" font-size="12">RSS</text>
        <path d="M75 103h48" stroke="#bd5575" stroke-opacity="0.55"/>
        <text x="20" y="145" fill="#ded5c5" font-size="12">API</text>
        <path d="M75 141h48" stroke="#8d9b83" stroke-opacity="0.55"/>
      </g>

      <g fill="none" stroke="#c5a769" stroke-opacity="0.55">
        <path d="M150 85h42"/>
        <path d="m184 79 8 6-8 6"/>
        <path d="M368 85h42"/>
        <path d="m402 79 8 6-8 6"/>
      </g>
    </g>

    <g transform="translate(0 234)" font-family="ui-monospace, SFMono-Regular, Consolas, monospace">
      <rect width="562" height="70" rx="14" fill="#070709" stroke="#f4ead6" stroke-opacity="0.13"/>
      <circle cx="20" cy="18" r="4" fill="#bd5575"/>
      <circle cx="34" cy="18" r="4" fill="#c5a769"/>
      <circle cx="48" cy="18" r="4" fill="#8d9b83"/>
      <text x="20" y="50" fill="#c5a769" font-size="11">xgwnje@index</text>
      <text x="109" y="50" fill="#706d69" font-size="11">~</text>
      <text x="124" y="50" fill="#d8d0c1" font-size="11">publish --keep-context</text>
      <rect x="290" y="40" width="7" height="13" rx="1" fill="#bd5575"/>
    </g>
  </g>
</svg>
